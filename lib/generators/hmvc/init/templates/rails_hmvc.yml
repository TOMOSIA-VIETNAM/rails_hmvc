# ─────────────────────────────────────────────────────────────────────────────
# Rails HMVC Configuration
# ─────────────────────────────────────────────────────────────────────────────

default: &default
  # Project type: "api" or "web"
  # Affects templates and generators
  type: api

  # Default API version
  api_version: v1

  # Default behavior for adding routes
  skip_routes: false

  # Parent classes for generated components
  parent_controller: ApplicationController
  parent_operation: ApplicationOperation
  parent_form: ApplicationForm
  parent_serializer: ApplicationSerializer

  api:
    parent_controller: ApplicationController
  web:
    parent_controller: ApplicationController

development:
  <<: *default
