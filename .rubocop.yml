# Rails HMVC RuboCop Configuration

require:
  - rails_hmvc

plugins:
  - rubocop-rails
  - rubocop-rspec

AllCops:
  TargetRubyVersion: 2.7
  NewCops: enable
  Exclude:
    - 'vendor/**/*'
    - 'bin/**/*'
    - 'db/**/*'
    - 'node_modules/**/*'
    - 'tmp/**/*'
    - 'log/**/*'
    - 'spec/fixtures/**/*'

# ============================================================================
# STYLE RULES
# ============================================================================

Style/Documentation:
  Enabled: false

Style/StringLiterals:
  EnforcedStyle: single_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

Style/FrozenStringLiteralComment:
  Enabled: true

Style/ClassAndModuleChildren:
  EnforcedStyle: compact
  Exclude:
    - 'app/controllers/**/*'
    - 'app/operations/**/*'
    - 'app/forms/**/*'
    - 'app/serializers/**/*'

Style/MethodCallWithArgsParentheses:
  Enabled: true
  EnforcedStyle: require_parentheses
  Exclude:
    - 'Gemfile'
    - 'Rakefile'
    - '*.gemspec'

# ============================================================================
# LAYOUT RULES
# ============================================================================

Layout/LineLength:
  Max: 120

# ============================================================================
# METRICS RULES - HMVC Optimized
# ============================================================================

Metrics/MethodLength:
  Max: 20
  Exclude:
    - 'lib/generators/**/*'
    - 'app/operations/**/step_*.rb'  # Step methods can be longer

Metrics/ClassLength:
  Max: 300
  Exclude:
    - 'lib/generators/**/*'
    - 'app/operations/**/*'  # Operations can be longer due to step methods

Metrics/BlockLength:
  Exclude:
    - 'spec/**/*'
    - 'lib/generators/**/*'
    - 'config/routes.rb'

Metrics/AbcSize:
  Max: 20
  Exclude:
    - 'app/operations/**/step_*.rb'  # Step methods can be more complex

# ============================================================================
# NAMING CONVENTIONS - HMVC Specific
# ============================================================================

Naming/MethodName:
  EnforcedStyle: snake_case
  Include:
    - 'app/operations/**/*.rb'
  AllowedPatterns:
    - '^step_'  # Allow step_ prefix in operations

# ============================================================================
# RAILS SPECIFIC RULES
# ============================================================================

Rails/ActionFilter:
  EnforcedStyle: action
  Include:
    - 'app/controllers/**/*.rb'

# ============================================================================
# RSPEC RULES
# ============================================================================

RSpec/DescribedClass:
  Enabled: true

RSpec/ExampleLength:
  Max: 10

RSpec/MultipleExpectations:
  Max: 5

RSpec/NestedGroups:
  Max: 3

# ============================================================================
# RAILS HMVC CUSTOM COPS
# ============================================================================

# ─────────────────────────────────────────────────────────────────────────────
# OPERATIONS COPS
# ─────────────────────────────────────────────────────────────────────────────

RailsHmvc/Operations/CallMethod:
  Description: 'Operation classes must have a call method'
  Enabled: true
  Include:
    - 'app/operations/**/*_operation.rb'

RailsHmvc/Operations/StepMethods:
  Description: 'Operation call method should delegate to step methods'
  Enabled: true
  Include:
    - 'app/operations/**/*_operation.rb'
  EnforceStepPrefix: true  # Require step_ prefix for step methods

RailsHmvc/Operations/StepMethodDefinitions:
  Description: 'Private methods in Operations should have step_ prefix'
  Enabled: true
  Include:
    - 'app/operations/**/*_operation.rb'
  AutoCorrect: true

RailsHmvc/Operations/RestfulNaming:
  Description: 'Operation files should use RESTful action names'
  Enabled: true
  Include:
    - 'app/operations/**/*_operation.rb'
  Severity: warning

RailsHmvc/Operations/BusinessLogicOnly:
  Description: 'Operations should not contain direct model calls in call method'
  Enabled: true
  Include:
    - 'app/operations/**/*_operation.rb'
  AllowedMethods: ['find', 'find_by']  # Simple finds are OK

# ─────────────────────────────────────────────────────────────────────────────
# FORMS COPS
# ─────────────────────────────────────────────────────────────────────────────

RailsHmvc/Forms/ValidationOnly:
  Description: 'Form classes should only contain validation logic'
  Enabled: true
  Include:
    - 'app/forms/**/*_form.rb'
  AllowedMethods: ['validates', 'validate', 'attribute', 'valid!', 'errors']

RailsHmvc/Forms/NoDatabaseInteraction:
  Description: 'Form classes should not interact with database'
  Enabled: true
  Include:
    - 'app/forms/**/*_form.rb'

RailsHmvc/Forms/RestfulNaming:
  Description: 'Form files should use RESTful action names'
  Enabled: true
  Include:
    - 'app/forms/**/*_form.rb'
  Severity: warning

# ─────────────────────────────────────────────────────────────────────────────
# CONTROLLERS COPS
# ─────────────────────────────────────────────────────────────────────────────

RailsHmvc/Controllers/NoBusinessLogic:
  Description: 'Controllers should not contain business logic'
  Enabled: true
  Include:
    - 'app/controllers/**/*_controller.rb'
  AllowedMethods: ['render', 'redirect_to', 'head', 'params']

RailsHmvc/Controllers/DelegateToOperations:
  Description: 'Controller actions should delegate to Operations'
  Enabled: true
  Include:
    - 'app/controllers/**/*_controller.rb'
  EnforceForActions: ['create', 'update', 'destroy']  # Must use operations

# ─────────────────────────────────────────────────────────────────────────────
# MODELS COPS
# ─────────────────────────────────────────────────────────────────────────────

RailsHmvc/Models/ConcernsLocation:
  Description: 'Complex model methods should be extracted to concerns'
  Enabled: true
  Include:
    - 'app/models/*.rb'
  Exclude:
    - 'app/models/concerns/**/*'
  MaxMethodLines: 5      # Methods longer than this should be in concerns
  MaxModelMethods: 8     # Models with more methods should use concerns
